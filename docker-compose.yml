services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clarisal}
      POSTGRES_USER: ${POSTGRES_USER:-clarisal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clarisal_dev_password}
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clarisal}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailpit:
    image: axllent/mailpit:v1.27
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["/bin/sh", "/app/docker/start-web.sh", "python", "manage.py", "runserver", "0.0.0.0:8000"]
    volumes:
      - ./backend:/app
      - backend_static:/app/staticfiles
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      ALLOWED_HOSTS: localhost,127.0.0.1,backend,edge-proxy,.clarisal.com,www.clarisal.com
      CORS_ALLOWED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173,http://edge-proxy,https://www.clarisal.com
      CSRF_TRUSTED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173,http://edge-proxy,https://www.clarisal.com,https://*.clarisal.com
      DJANGO_SETTINGS_MODULE: clarisal.settings.development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health/').getcode()==200 else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 25s

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A clarisal worker -l info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      ALLOWED_HOSTS: localhost,127.0.0.1,backend,edge-proxy,.clarisal.com,www.clarisal.com
      CORS_ALLOWED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173,http://edge-proxy,https://www.clarisal.com
      CSRF_TRUSTED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173,http://edge-proxy,https://www.clarisal.com,https://*.clarisal.com
      DJANGO_SETTINGS_MODULE: clarisal.settings.development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
      backend:
        condition: service_healthy
    restart: on-failure

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A clarisal beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      ALLOWED_HOSTS: localhost,127.0.0.1,backend,edge-proxy,.clarisal.com,www.clarisal.com
      CORS_ALLOWED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173,http://edge-proxy,https://www.clarisal.com
      CSRF_TRUSTED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173,http://edge-proxy,https://www.clarisal.com,https://*.clarisal.com
      DJANGO_SETTINGS_MODULE: clarisal.settings.development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
      backend:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "127.0.0.1:5173:5173"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5173').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  edge-proxy:
    image: nginx:alpine
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "127.0.0.1:${EDGE_PROXY_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/__proxy_health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 5s

volumes:
  postgres_data:
  backend_static:
