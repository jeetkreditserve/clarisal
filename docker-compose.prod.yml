services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clarisal}
      POSTGRES_USER: ${POSTGRES_USER:-clarisal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clarisal_dev_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clarisal}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["/bin/sh", "/app/docker/start-web.sh", "gunicorn", "clarisal.wsgi:application", "--bind", "0.0.0.0:8000", "--workers", "4"]
    volumes:
      - backend_static:/app/staticfiles
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: clarisal.settings.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health/').getcode()==200 else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 25s

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A clarisal worker -l info
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: clarisal.settings.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: on-failure

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A clarisal beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: clarisal.settings.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  edge-proxy:
    image: nginx:alpine
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - backend_static:/var/www/static:ro
    ports:
      - "127.0.0.1:${EDGE_PROXY_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/__proxy_health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 5s

volumes:
  postgres_data:
  backend_static:
