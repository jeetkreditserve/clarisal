[tool.ruff]
line-length = 120
target-version = "py311"
exclude = [
    "*/migrations/*",
]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "N",
    "B",
    "UP",
]
ignore = [
    "E501",
    "B904",
]

[tool.ruff.lint.per-file-ignores]
"backend/clarisal/settings/*.py" = ["F403", "F405"]

[tool.bandit]
exclude_dirs = ["tests", "migrations"]
skips = ["B101"]
